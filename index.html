function Reveal({children, delay=0, style={}}) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, {threshold:0.1});
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{opacity:v?1:0,transform:v?"none":"translateY(40px)",transition:"all 0.9s cubic-bezier(.16,1,.3,1) "+delay+"s",...style}}>{children}</div>
  );
}

function AnimCounter({end, suffix=""}) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const endNum = parseInt(end);
        const dur = 1500;
        const start = Date.now();
        const tick = () => {
          const elapsed = Date.now() - start;
          const p = Math.min(elapsed/dur, 1);
          setVal(Math.floor((1-Math.pow(1-p,3)) * endNum));
          if (p < 1) requestAnimationFrame(tick);
        };
        tick();
      }
    }, {threshold:0.3});
    obs.observe(el);
    return () => obs.disconnect();
  }, [end]);
  return <span ref={ref}>{val}{suffix}</span>;
}

      allSkills.push({...sk, x, y: catPositions[ci].y, ci, idx: allSkills.length});
    });

  const connections = [];
  allSkills.forEach((a, i) => {

        if (aLinks.some(l => bLinks.includes(l))) connections.push([i, j]);
      }
    });
  });
  const uniqueConns = connections.filter(([a,b], idx) => connections.findIndex(([x,y]) => x===a && y===b) === idx).slice(0, 30);

  return (
    <div style={{position:"relative",width:"100%",minHeight:450,marginTop:"1rem"}}>
      <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",zIndex:0}}>
        {uniqueConns.map(([a,b],i) => {
          const pa = allSkills[a]; const pb = allSkills[b];

        const isH = hovered === i;
        return (
          <div key={sk.s+i} onClick={()=>onSkillClick(sk)}

      <Modal open={!!jM} onClose={()=>setJM(null)} title={jM?.title} subtitle={jM?.yr}>
        <p style={{color:"#E8845C",fontSize:"0.8rem",fontWeight:500}}>{jM?.org}</p>
        <p style={{fontSize:"0.7rem",color:"rgba(255,255,255,0.3)",marginBottom:"1rem"}}>{jM?.loc}</p>
        <ul style={{listStyle:"none",padding:0}}>
          {jM?.bullets?.map((b,i) => (<li key={i} style={{color:"rgba(255,255,255,0.5)",fontSize:"0.85rem",lineHeight:1.7,fontWeight:300,paddingLeft:"1rem",borderLeft:"2px solid rgba(232,132,92,0.2)",marginBottom:"0.5rem"}}>{b}</li>))}
        </ul>
      </Modal>
      <Modal open={!!skM} onClose={()=>setSkM(null)} title={skM?.s} subtitle="Skill">
        <p style={{color:"rgba(255,255,255,0.6)",fontSize:"0.9rem",lineHeight:1.7,fontWeight:300,marginBottom:"1rem"}}>{skM?.desc}</p>
        <p style={{color:"rgba(255,255,255,0.35)",fontSize:"0.72rem",fontWeight:500}}>Where:</p>
        <p style={{color:"#E8845C",fontSize:"0.85rem",fontWeight:500}}>{skM?.links}</p>
      </Modal>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Portfolio />);
</script>
</body>
</html>
