function Reveal({children, delay=0, style={}}) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); obs.disconnect(); } }, {threshold:0.1});
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{opacity:v?1:0,transform:v?"none":"translateY(40px)",transition:"all 0.9s cubic-bezier(.16,1,.3,1) "+delay+"s",...style}}>{children}</div>
  );
}

function AnimCounter({end, suffix=""}) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const endNum = parseInt(end);
        const dur = 1500;
        const start = Date.now();
        const tick = () => {
          const elapsed = Date.now() - start;
          const p = Math.min(elapsed/dur, 1);
          setVal(Math.floor((1-Math.pow(1-p,3)) * endNum));
          if (p < 1) requestAnimationFrame(tick);
        };
        tick();
      }
    }, {threshold:0.3});
    obs.observe(el);
    return () => obs.disconnect();
  }, [end]);
  return <span ref={ref}>{val}{suffix}</span>;
}

  const connections = [];

      }
    });
  });
  const uniqueConns = connections.filter(([a,b], idx) => connections.findIndex(([x,y]) => x===a && y===b) === idx).slice(0, 30);

  return (
    <div style={{position:"relative",width:"100%",minHeight:450,marginTop:"1rem"}}>

        return (
          <div key={sk.s+i} onClick={()=>onSkillClick(sk)}
